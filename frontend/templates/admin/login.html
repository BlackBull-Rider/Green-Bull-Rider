<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Admin Login</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#07142c;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
color:white;
}

.login-box{
background:#16253f;
padding:30px;
border-radius:15px;
width:90%;
max-width:400px;
}

h2{
text-align:center;
margin-bottom:20px;
color:#22c55e;
}

input{
width:100%;
padding:12px;
margin-bottom:15px;
border:none;
border-radius:10px;
}

button{
width:100%;
padding:12px;
border:none;
border-radius:10px;
background:#22c55e;
font-weight:bold;
font-size:16px;
}

</style>
</head>

<body>

<div class="login-box">

<h2>🛡 Admin Login</h2>

<input type="text" placeholder="Username">

<input type="password" placeholder="Password">

<button>
Login
</button>

</div>

</body>
</html>
