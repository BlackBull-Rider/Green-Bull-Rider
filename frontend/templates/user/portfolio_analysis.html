<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Portfolio Analysis</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#07142c;
color:white;
}

.header{
padding:18px;
text-align:center;
font-size:24px;
font-weight:bold;
color:#22c55e;
}

.topbar{
padding:12px;
background:#0d1f3f;
display:flex;
gap:10px;
overflow-x:auto;
}

.topbar a{
text-decoration:none;
color:white;
background:#1e293b;
padding:10px 15px;
border-radius:10px;
white-space:nowrap;
}

.container{
padding:10px;
}

.summary{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
margin-bottom:15px;
}

.card{
background:#16253f;
padding:15px;
border-radius:12px;
text-align:center;
}

.title{
font-size:12px;
color:#94a3b8;
}

.value{
font-size:22px;
font-weight:bold;
margin-top:5px;
}

.section{
background:#16253f;
padding:15px;
border-radius:12px;
margin-bottom:15px;
}

.section h3{
margin-bottom:10px;
color:#22c55e;
}

.green{
color:#22c55e;
}

.red{
color:#ef4444;
}

</style>
</head>

<body>

<div class="header">
📊 Portfolio Analysis
</div>

<div class="topbar">
<a href="/ui/dashboard">Dashboard</a>
<a href="/ui/portfolio">Portfolio</a>
<a href="/ui/screener">Screener</a>
</div>

<div class="container">

<div class="summary">

<div class="card">
<div class="title">Invested</div>
<div class="value" id="invested">0</div>
</div>

<div class="card">
<div class="title">Current</div>
<div class="value" id="current">0</div>
</div>

<div class="card">
<div class="title">PnL</div>
<div class="value" id="pnl">0</div>
</div>

<div class="card">
<div class="title">PnL %</div>
<div class="value" id="pnl_percent">0%</div>
</div>

</div>

<div class="section">
<h3>🏆 Top Winner</h3>
<div id="winner">Loading...</div>
</div>

<div class="section">
<h3>📉 Top Loser</h3>
<div id="loser">Loading...</div>
</div>

<div class="section">
<h3>⚠ Risk Summary</h3>
<div id="risk">
Portfolio Risk Analysis Coming Soon
</div>
</div>

<div class="section">
<h3>🎯 Allocation</h3>
<div id="allocation">
Sector Allocation Coming Soon
</div>
</div>

</div>

<script>

fetch("/portfolio-analysis/")
.then(r=>r.json())
.then(data=>{

document.getElementById("invested").innerText =
data.invested_value || 0;

document.getElementById("current").innerText =
data.current_value || 0;

document.getElementById("pnl").innerText =
data.total_pnl || 0;

document.getElementById("pnl_percent").innerText =
(data.total_pnl_percent || 0) + "%";

let holdings = data.holdings || [];

if(holdings.length > 0){

let winner =
holdings.reduce(
(a,b)=>
a.pnl_percent>b.pnl_percent?a:b
);

let loser =
holdings.reduce(
(a,b)=>
a.pnl_percent<b.pnl_percent?a:b
);

document.getElementById("winner").innerHTML = `
<b>${winner.symbol}</b><br>
PnL: ${winner.pnl}<br>
Return: ${winner.pnl_percent}%
`;

document.getElementById("loser").innerHTML = `
<b>${loser.symbol}</b><br>
PnL: ${loser.pnl}<br>
Return: ${loser.pnl_percent}%
`;

}

});

</script>

</body>
</html>
