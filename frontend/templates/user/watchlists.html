<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Watchlists</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#07142c;
color:white;
}

.header{
padding:18px;
text-align:center;
font-size:24px;
font-weight:bold;
color:#22c55e;
}

.topbar{
padding:12px;
background:#0d1f3f;
display:flex;
gap:10px;
overflow-x:auto;
}

.topbar a{
text-decoration:none;
color:white;
background:#1e293b;
padding:10px 15px;
border-radius:10px;
white-space:nowrap;
}

.container{
padding:10px;
}

.card{
background:#16253f;
padding:15px;
border-radius:12px;
margin-bottom:12px;
}

.card h3{
margin-bottom:10px;
color:#22c55e;
}

.empty{
text-align:center;
padding:30px;
color:#94a3b8;
}

.watch-item{
background:#1d2d4a;
padding:12px;
border-radius:10px;
margin-bottom:8px;
}

.symbol{
font-size:18px;
font-weight:bold;
}

</style>
</head>

<body>

<div class="header">
⭐ Watchlists
</div>

<div class="topbar">
<a href="/ui/dashboard">Dashboard</a>
<a href="/ui/screener">Screener</a>
<a href="/ui/portfolio">Portfolio</a>
<a href="/ui/market">Market</a>
<a href="/ui/profile">Profile</a>
</div>

<div class="container">

<div class="card">
<h3>My Watchlist</h3>

<div class="empty">
No stocks added yet
</div>
</div>

<div class="card">
<h3>Smart Watchlist</h3>

<div id="smartlist">
Loading...
</div>
</div>

</div>

<script>

fetch("/swing/")
.then(r=>r.json())
.then(data=>{

let stocks=data.results||[];

let html="";

stocks
.slice(0,20)
.forEach(x=>{

html+=`
<div class="watch-item">
<div class="symbol">${x.symbol}</div>
Score: ${x.master_score}
</div>
`;

});

document.getElementById("smartlist").innerHTML=html;

});

</script>

</body>
</html>
